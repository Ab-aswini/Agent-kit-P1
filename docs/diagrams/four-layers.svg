<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="l4Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="l3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#F87171"/>
    </linearGradient>
    <linearGradient id="l2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
    <linearGradient id="l1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <filter id="sh2">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="16" fill="url(#bg2)"/>
  <rect width="900" height="520" rx="16" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="700" letter-spacing="1">THE FOUR LAYERS OF AGENT-KIT</text>
  <line x1="280" y1="48" x2="620" y2="48" stroke="#30363d" stroke-width="1"/>

  <!-- LAYER 4 — INTERFACE -->
  <rect x="60" y="65" width="780" height="90" rx="14" fill="#1c1f26" stroke="#7C3AED" stroke-width="2" filter="url(#sh2)"/>
  <rect x="60" y="65" width="8" height="90" rx="4" fill="url(#l4Grad)"/>

  <text x="90" y="87" fill="#A78BFA" font-size="11" font-weight="700" letter-spacing="2">LAYER 4</text>
  <text x="170" y="87" fill="#f0f6fc" font-size="13" font-weight="700">INTERFACE</text>
  <text x="310" y="87" fill="#8b949e" font-size="11">How You Interact</text>

  <rect x="90" y="100" width="145" height="40" rx="10" fill="#7C3AED" opacity="0.2" stroke="#7C3AED" stroke-width="1"/>
  <text x="162" y="125" text-anchor="middle" fill="#C4B5FD" font-size="13" font-weight="600">&#x2328;&#xFE0F; CLI Commands</text>

  <rect x="255" y="100" width="230" height="40" rx="10" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="1"/>
  <text x="370" y="125" text-anchor="middle" fill="#C4B5FD" font-size="13" font-weight="600">&#x1F4BB; AI IDE (Cursor / Windsurf)</text>

  <rect x="505" y="100" width="145" height="40" rx="10" fill="#A78BFA" opacity="0.2" stroke="#A78BFA" stroke-width="1"/>
  <text x="577" y="125" text-anchor="middle" fill="#C4B5FD" font-size="13" font-weight="600">&#x1F4E6; NPX / NPM</text>

  <rect x="670" y="100" width="150" height="40" rx="10" fill="#6D28D9" opacity="0.2" stroke="#6D28D9" stroke-width="1"/>
  <text x="745" y="125" text-anchor="middle" fill="#C4B5FD" font-size="13" font-weight="600">&#x1F517; MCP Protocol</text>

  <!-- Arrow -->
  <text x="450" y="170" text-anchor="middle" fill="#7C3AED" font-size="18">&#x25BC;</text>

  <!-- LAYER 3 — ORCHESTRATION -->
  <rect x="60" y="180" width="780" height="90" rx="14" fill="#1c1f26" stroke="#EF4444" stroke-width="2" filter="url(#sh2)"/>
  <rect x="60" y="180" width="8" height="90" rx="4" fill="url(#l3Grad)"/>

  <text x="90" y="202" fill="#F87171" font-size="11" font-weight="700" letter-spacing="2">LAYER 3</text>
  <text x="170" y="202" fill="#f0f6fc" font-size="13" font-weight="700">ORCHESTRATION</text>
  <text x="340" y="202" fill="#8b949e" font-size="11">How Agents Coordinate</text>

  <rect x="90" y="215" width="155" height="40" rx="10" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="1"/>
  <text x="167" y="240" text-anchor="middle" fill="#FCA5A5" font-size="13" font-weight="600">&#x1F6A6; Socratic Gate</text>

  <rect x="265" y="215" width="155" height="40" rx="10" fill="#EC4899" opacity="0.15" stroke="#EC4899" stroke-width="1"/>
  <text x="342" y="240" text-anchor="middle" fill="#F9A8D4" font-size="13" font-weight="600">&#x26A1; 2-Phase Engine</text>

  <rect x="440" y="215" width="170" height="40" rx="10" fill="#F43F5E" opacity="0.15" stroke="#F43F5E" stroke-width="1"/>
  <text x="525" y="240" text-anchor="middle" fill="#FDA4AF" font-size="13" font-weight="600">&#x1F451; Tiered Authority</text>

  <rect x="630" y="215" width="155" height="40" rx="10" fill="#FB7185" opacity="0.15" stroke="#FB7185" stroke-width="1"/>
  <text x="707" y="240" text-anchor="middle" fill="#FECDD3" font-size="13" font-weight="600">&#x1F4CB; 19 Workflows</text>

  <!-- Arrow -->
  <text x="450" y="285" text-anchor="middle" fill="#EF4444" font-size="18">&#x25BC;</text>

  <!-- LAYER 2 — INTELLIGENCE -->
  <rect x="60" y="295" width="780" height="90" rx="14" fill="#1c1f26" stroke="#F59E0B" stroke-width="2" filter="url(#sh2)"/>
  <rect x="60" y="295" width="8" height="90" rx="4" fill="url(#l2Grad)"/>

  <text x="90" y="317" fill="#FBBF24" font-size="11" font-weight="700" letter-spacing="2">LAYER 2</text>
  <text x="170" y="317" fill="#f0f6fc" font-size="13" font-weight="700">INTELLIGENCE</text>
  <text x="310" y="317" fill="#8b949e" font-size="11">How Agents Think</text>

  <rect x="90" y="330" width="170" height="40" rx="10" fill="#F59E0B" opacity="0.15" stroke="#F59E0B" stroke-width="1"/>
  <text x="175" y="355" text-anchor="middle" fill="#FDE68A" font-size="13" font-weight="600">&#x1F50D; BM25 Search</text>

  <rect x="280" y="330" width="175" height="40" rx="10" fill="#F97316" opacity="0.15" stroke="#F97316" stroke-width="1"/>
  <text x="367" y="355" text-anchor="middle" fill="#FED7AA" font-size="13" font-weight="600">&#x1F3A8; Design Generator</text>

  <rect x="475" y="330" width="170" height="40" rx="10" fill="#FBBF24" opacity="0.15" stroke="#FBBF24" stroke-width="1"/>
  <text x="560" y="355" text-anchor="middle" fill="#FEF3C7" font-size="13" font-weight="600">&#x1F4A1; Reasoning Engine</text>

  <rect x="665" y="330" width="155" height="40" rx="10" fill="#FCD34D" opacity="0.15" stroke="#FCD34D" stroke-width="1"/>
  <text x="742" y="355" text-anchor="middle" fill="#FEF9C3" font-size="13" font-weight="600">&#x1F916; Agent Spawner</text>

  <!-- Arrow -->
  <text x="450" y="400" text-anchor="middle" fill="#F59E0B" font-size="18">&#x25BC;</text>

  <!-- LAYER 1 — DATA -->
  <rect x="60" y="410" width="780" height="90" rx="14" fill="#1c1f26" stroke="#10B981" stroke-width="2" filter="url(#sh2)"/>
  <rect x="60" y="410" width="8" height="90" rx="4" fill="url(#l1Grad)"/>

  <text x="90" y="432" fill="#34D399" font-size="11" font-weight="700" letter-spacing="2">LAYER 1</text>
  <text x="170" y="432" fill="#f0f6fc" font-size="13" font-weight="700">DATA</text>
  <text x="220" y="432" fill="#8b949e" font-size="11">What Agents Know</text>

  <rect x="90" y="445" width="170" height="40" rx="10" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="1"/>
  <text x="175" y="470" text-anchor="middle" fill="#6EE7B7" font-size="13" font-weight="600">&#x1F4C4; 54 Agent Protocols</text>

  <rect x="280" y="445" width="155" height="40" rx="10" fill="#06B6D4" opacity="0.15" stroke="#06B6D4" stroke-width="1"/>
  <text x="357" y="470" text-anchor="middle" fill="#67E8F9" font-size="13" font-weight="600">&#x1F9E9; 69+ Skills</text>

  <rect x="455" y="445" width="170" height="40" rx="10" fill="#14B8A6" opacity="0.15" stroke="#14B8A6" stroke-width="1"/>
  <text x="540" y="470" text-anchor="middle" fill="#5EEAD4" font-size="13" font-weight="600">&#x1F4CA; 34 CSV Datasets</text>

  <rect x="645" y="445" width="170" height="40" rx="10" fill="#2DD4BF" opacity="0.15" stroke="#2DD4BF" stroke-width="1"/>
  <text x="730" y="470" text-anchor="middle" fill="#99F6E4" font-size="13" font-weight="600">&#x1F9E0; Memory Hubs</text>
</svg>

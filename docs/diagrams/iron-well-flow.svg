<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="sh4">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="460" rx="16" fill="url(#bg4)"/>
  <rect width="900" height="460" rx="16" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#f0f6fc" font-size="18" font-weight="700" letter-spacing="1">THE IRON WELL PROTOCOL</text>
  <text x="450" y="55" text-anchor="middle" fill="#8b949e" font-size="12">Every complex task follows this exact governance flow</text>

  <!-- Phase 0: Socratic Gate -->
  <rect x="30" y="75" width="260" height="170" rx="14" fill="#1c1f26" stroke="#EF4444" stroke-width="2"/>
  <rect x="30" y="75" width="260" height="35" rx="14" fill="#EF4444" opacity="0.15"/>
  <rect x="30" y="96" width="260" height="1" fill="#EF4444" opacity="0.3"/>
  <text x="160" y="96" text-anchor="middle" fill="#F87171" font-size="12" font-weight="700">PHASE 0 &#x2014; SOCRATIC GATE</text>

  <text x="50" y="128" fill="#f0f6fc" font-size="11">&#x1F464; You: <tspan fill="#8b949e">"Build a dashboard"</tspan></text>

  <text x="50" y="153" fill="#EF4444" font-size="11">&#x1F6A6; SFS-001 asks 3+ questions:</text>

  <text x="60" y="173" fill="#FCA5A5" font-size="10">Q1: <tspan fill="#8b949e">What data sources?</tspan></text>
  <text x="60" y="189" fill="#FCA5A5" font-size="10">Q2: <tspan fill="#8b949e">Who are the users?</tspan></text>
  <text x="60" y="205" fill="#FCA5A5" font-size="10">Q3: <tspan fill="#8b949e">Compliance constraints?</tspan></text>

  <text x="160" y="232" text-anchor="middle" fill="#10B981" font-size="10" font-weight="700">&#x2705; Clarity achieved &#x2014; no guessing</text>

  <!-- Arrow Phase 0 → 1 -->
  <line x1="295" y1="160" x2="325" y2="160" stroke="#8b949e" stroke-width="2"/>
  <polygon points="322,155 332,160 322,165" fill="#8b949e"/>

  <!-- Phase 1: Planning -->
  <rect x="335" y="75" width="230" height="170" rx="14" fill="#1c1f26" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="335" y="75" width="230" height="35" rx="14" fill="#8B5CF6" opacity="0.15"/>
  <rect x="335" y="96" width="230" height="1" fill="#8B5CF6" opacity="0.3"/>
  <text x="450" y="96" text-anchor="middle" fill="#A78BFA" font-size="12" font-weight="700">PHASE 1 &#x2014; PLANNING</text>

  <rect x="360" y="110" width="180" height="22" rx="6" fill="#EF4444" opacity="0.15" stroke="#EF4444" stroke-width="0.5"/>
  <text x="450" y="126" text-anchor="middle" fill="#FCA5A5" font-size="10" font-weight="700">&#x1F6AB; NO CODE ALLOWED</text>

  <text x="355" y="152" fill="#A78BFA" font-size="11">&#x1F4CB; SP-001 creates plan:</text>

  <text x="365" y="172" fill="#8b949e" font-size="10">&#x2022; milestones.md</text>
  <text x="365" y="188" fill="#8b949e" font-size="10">&#x2022; Task breakdown &amp; ownership</text>
  <text x="365" y="204" fill="#8b949e" font-size="10">&#x2022; Risk assessment</text>

  <text x="450" y="232" text-anchor="middle" fill="#F59E0B" font-size="10" font-weight="700">&#x1F464; You approve the plan</text>

  <!-- Arrow Phase 1 → 2 -->
  <line x1="570" y1="160" x2="600" y2="160" stroke="#8b949e" stroke-width="2"/>
  <polygon points="597,155 607,160 597,165" fill="#8b949e"/>

  <!-- Phase 2: Execution -->
  <rect x="610" y="75" width="260" height="170" rx="14" fill="#1c1f26" stroke="#10B981" stroke-width="2"/>
  <rect x="610" y="75" width="260" height="35" rx="14" fill="#10B981" opacity="0.15"/>
  <rect x="610" y="96" width="260" height="1" fill="#10B981" opacity="0.3"/>
  <text x="740" y="96" text-anchor="middle" fill="#34D399" font-size="12" font-weight="700">PHASE 2 &#x2014; EXECUTION</text>

  <rect x="635" y="110" width="210" height="22" rx="6" fill="#10B981" opacity="0.15" stroke="#10B981" stroke-width="0.5"/>
  <text x="740" y="126" text-anchor="middle" fill="#6EE7B7" font-size="10" font-weight="700">&#x2705; CODE NOW ALLOWED</text>

  <text x="630" y="152" fill="#34D399" font-size="11">&#x1F527; Specialists execute:</text>

  <text x="640" y="172" fill="#8b949e" font-size="10">&#x2022; Backend builds API</text>
  <text x="640" y="188" fill="#8b949e" font-size="10">&#x2022; Frontend builds UI</text>
  <text x="640" y="204" fill="#8b949e" font-size="10">&#x2022; UI&amp;UX Engine provides design</text>

  <text x="740" y="232" text-anchor="middle" fill="#06B6D4" font-size="10" font-weight="700">&#x1F9EA; Submit to QA for review</text>

  <!-- Verification Section -->
  <rect x="30" y="275" width="840" height="80" rx="14" fill="#1c1f26" stroke="#F59E0B" stroke-width="2"/>
  <rect x="30" y="275" width="840" height="30" rx="14" fill="#F59E0B" opacity="0.1"/>
  <rect x="30" y="301" width="840" height="1" fill="#F59E0B" opacity="0.2"/>
  <text x="450" y="296" text-anchor="middle" fill="#FBBF24" font-size="12" font-weight="700">VERIFICATION &amp; APPROVAL</text>

  <!-- Verification flow -->
  <rect x="60" y="315" width="120" height="28" rx="8" fill="#06B6D4" opacity="0.2" stroke="#06B6D4" stroke-width="1"/>
  <text x="120" y="334" text-anchor="middle" fill="#67E8F9" font-size="11" font-weight="600">&#x1F9EA; QA Review</text>

  <text x="200" y="334" fill="#8b949e" font-size="16">&#x2192;</text>

  <rect x="220" y="315" width="140" height="28" rx="8" fill="#EF4444" opacity="0.2" stroke="#EF4444" stroke-width="1"/>
  <text x="290" y="334" text-anchor="middle" fill="#FCA5A5" font-size="11" font-weight="600">&#x1F6E1;&#xFE0F; Security Audit</text>

  <text x="378" y="334" fill="#8b949e" font-size="16">&#x2192;</text>

  <rect x="398" y="315" width="140" height="28" rx="8" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="1"/>
  <text x="468" y="334" text-anchor="middle" fill="#C4B5FD" font-size="11" font-weight="600">&#x2705; checklist.py</text>

  <text x="558" y="334" fill="#8b949e" font-size="16">&#x2192;</text>

  <rect x="575" y="315" width="140" height="28" rx="8" fill="#F59E0B" opacity="0.2" stroke="#F59E0B" stroke-width="1"/>
  <text x="645" y="334" text-anchor="middle" fill="#FDE68A" font-size="11" font-weight="600">&#x1F451; CTS Approval</text>

  <text x="735" y="334" fill="#8b949e" font-size="16">&#x2192;</text>

  <rect x="755" y="315" width="95" height="28" rx="8" fill="#10B981" opacity="0.2" stroke="#10B981" stroke-width="1"/>
  <text x="802" y="334" text-anchor="middle" fill="#6EE7B7" font-size="11" font-weight="600">&#x1F680; Deliver</text>

  <!-- Bottom: Key Principle -->
  <rect x="130" y="385" width="640" height="55" rx="14" fill="#1c1f26" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="450" y="410" text-anchor="middle" fill="#f0f6fc" font-size="13" font-weight="700">&#x1F4A1; The Key Principle</text>
  <text x="450" y="428" text-anchor="middle" fill="#8b949e" font-size="11">Most AI tools just start coding. Agent-Kit forces <tspan fill="#EF4444" font-weight="700">clarity first</tspan>, then <tspan fill="#8B5CF6" font-weight="700">plans</tspan>, then <tspan fill="#10B981" font-weight="700">executes</tspan>, then <tspan fill="#F59E0B" font-weight="700">verifies</tspan>.</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <filter id="sh5">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="16" fill="url(#bg5)"/>
  <rect width="900" height="200" rx="16" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" fill="#f0f6fc" font-size="15" font-weight="700" letter-spacing="1">DEPLOYMENT PIPELINE</text>

  <!-- Step 1: Developer -->
  <rect x="22" y="55" width="100" height="80" rx="12" fill="#1c1f26" stroke="#6366F1" stroke-width="1.5" filter="url(#sh5)"/>
  <text x="72" y="85" text-anchor="middle" fill="#fff" font-size="22">&#x1F9D1;&#x200D;&#x1F4BB;</text>
  <text x="72" y="108" text-anchor="middle" fill="#A5B4FC" font-size="10" font-weight="600">Developer</text>
  <text x="72" y="122" text-anchor="middle" fill="#6366F1" font-size="9">git push</text>

  <!-- Arrow -->
  <line x1="127" y1="95" x2="148" y2="95" stroke="#6366F1" stroke-width="2"/>
  <polygon points="145,90 155,95 145,100" fill="#6366F1"/>

  <!-- Step 2: GitHub -->
  <rect x="158" y="55" width="100" height="80" rx="12" fill="#1c1f26" stroke="#7C3AED" stroke-width="1.5" filter="url(#sh5)"/>
  <text x="208" y="85" text-anchor="middle" fill="#fff" font-size="22">&#x1F419;</text>
  <text x="208" y="108" text-anchor="middle" fill="#C4B5FD" font-size="10" font-weight="600">GitHub</text>
  <text x="208" y="122" text-anchor="middle" fill="#7C3AED" font-size="9">CI triggers</text>

  <!-- Arrow -->
  <line x1="263" y1="95" x2="284" y2="95" stroke="#7C3AED" stroke-width="2"/>
  <polygon points="281,90 291,95 281,100" fill="#7C3AED"/>

  <!-- Step 3: Lint -->
  <rect x="294" y="55" width="100" height="80" rx="12" fill="#1c1f26" stroke="#2563EB" stroke-width="1.5" filter="url(#sh5)"/>
  <text x="344" y="85" text-anchor="middle" fill="#fff" font-size="22">&#x1F50D;</text>
  <text x="344" y="108" text-anchor="middle" fill="#93C5FD" font-size="10" font-weight="600">Lint &amp; Types</text>
  <text x="344" y="122" text-anchor="middle" fill="#2563EB" font-size="9">code quality</text>

  <!-- Arrow -->
  <line x1="399" y1="95" x2="420" y2="95" stroke="#2563EB" stroke-width="2"/>
  <polygon points="417,90 427,95 417,100" fill="#2563EB"/>

  <!-- Step 4: Test -->
  <rect x="430" y="55" width="100" height="80" rx="12" fill="#1c1f26" stroke="#06B6D4" stroke-width="1.5" filter="url(#sh5)"/>
  <text x="480" y="85" text-anchor="middle" fill="#fff" font-size="22">&#x1F9EA;</text>
  <text x="480" y="108" text-anchor="middle" fill="#67E8F9" font-size="10" font-weight="600">Tests</text>
  <text x="480" y="122" text-anchor="middle" fill="#06B6D4" font-size="9">unit + E2E</text>

  <!-- Arrow -->
  <line x1="535" y1="95" x2="556" y2="95" stroke="#06B6D4" stroke-width="2"/>
  <polygon points="553,90 563,95 553,100" fill="#06B6D4"/>

  <!-- Step 5: Audit -->
  <rect x="566" y="55" width="100" height="80" rx="12" fill="#1c1f26" stroke="#F59E0B" stroke-width="1.5" filter="url(#sh5)"/>
  <text x="616" y="85" text-anchor="middle" fill="#fff" font-size="22">&#x2714;&#xFE0F;</text>
  <text x="616" y="108" text-anchor="middle" fill="#FDE68A" font-size="10" font-weight="600">Audit</text>
  <text x="616" y="122" text-anchor="middle" fill="#F59E0B" font-size="9">checklist.py</text>

  <!-- Arrow -->
  <line x1="671" y1="95" x2="692" y2="95" stroke="#F59E0B" stroke-width="2"/>
  <polygon points="689,90 699,95 689,100" fill="#F59E0B"/>

  <!-- Step 6: Publish -->
  <rect x="702" y="55" width="80" height="80" rx="12" fill="#1c1f26" stroke="#10B981" stroke-width="1.5" filter="url(#sh5)"/>
  <text x="742" y="85" text-anchor="middle" fill="#fff" font-size="22">&#x1F4E6;</text>
  <text x="742" y="108" text-anchor="middle" fill="#6EE7B7" font-size="10" font-weight="600">Publish</text>
  <text x="742" y="122" text-anchor="middle" fill="#10B981" font-size="9">npm</text>

  <!-- Arrow -->
  <line x1="787" y1="95" x2="808" y2="95" stroke="#10B981" stroke-width="2"/>
  <polygon points="805,90 815,95 805,100" fill="#10B981"/>

  <!-- Step 7: User -->
  <rect x="818" y="55" width="65" height="80" rx="12" fill="#1c1f26" stroke="#7C3AED" stroke-width="2" filter="url(#sh5)"/>
  <text x="850" y="85" text-anchor="middle" fill="#fff" font-size="22">&#x1F680;</text>
  <text x="850" y="108" text-anchor="middle" fill="#C4B5FD" font-size="10" font-weight="600">User</text>
  <text x="850" y="122" text-anchor="middle" fill="#7C3AED" font-size="9">npx init</text>

  <!-- Fail path -->
  <line x1="616" y1="140" x2="616" y2="165" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="616" y1="165" x2="72" y2="165" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="72" y1="165" x2="72" y2="140" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="66,143 72,135 78,143" fill="#EF4444"/>
  <text x="344" y="180" text-anchor="middle" fill="#EF4444" font-size="10" font-weight="600">&#x274C; Audit fails &#x2192; fix &amp; retry</text>
</svg>
